services:
  mysql-despachos:
    image: mysql:8.0
    container_name: mysql-despachos
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_despachos_data:/var/lib/mysql
    networks:
      - despachos-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  back-despachos:
    image: ${DOCKERHUB_USERNAME}/back-despachos:latest
    container_name: back-despachos
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql-despachos
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql-despachos:
        condition: service_healthy
    networks:
      - despachos-net

volumes:
  mysql_despachos_data:

networks:
  despachos-net:
    driver: bridge